name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out imputation-paper
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      # No extras: the toy smoke harness runs on core deps only (numpy, pandas,
      # scipy). The `methods` extra pulls the git-based method packages and is
      # deliberately excluded from CI; `imputation_paper.methods` imports each
      # method lazily so the registry still imports and lists without them.
      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .
